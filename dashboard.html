<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Dashboard</title>
  <link rel="stylesheet" href="css/styles-bluebook.css">
  <style>
    /* ── Layout ────────────────────────────────────────────────────────── */
    .dash-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .dash-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .dash-greeting {
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }
    .dash-subgreeting {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    .dash-profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 4px;
    }

    /* ── Grid ──────────────────────────────────────────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .dash-grid { grid-template-columns: 1fr; }
    }
    .dash-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }
    .dash-card-full {
      grid-column: 1 / -1;
    }
    .dash-card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* ── Score card ────────────────────────────────────────────────────── */
    .score-total {
      font-size: 56px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .score-outof {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .score-gap-pill {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .score-gap-pill.achieved {
      background: #22c55e;
    }
    .score-breakdown {
      display: flex;
      gap: 16px;
    }
    .score-section {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .score-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .score-section-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    /* ── Countdown card ────────────────────────────────────────────────── */
    .countdown-days {
      font-size: 52px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .countdown-label {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .countdown-date {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ── Trait bars ────────────────────────────────────────────────────── */
    .trait-compact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .trait-compact-row:last-child { margin-bottom: 0; }
    .trait-compact-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 28px;
      flex-shrink: 0;
    }
    .trait-compact-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .trait-compact-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .trait-compact-fill.low { background: var(--text-dim); }
    .trait-compact-level {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Next steps ────────────────────────────────────────────────────── */
    .next-steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 600px) {
      .next-steps-grid { grid-template-columns: 1fr; }
    }
    .next-step-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 18px 16px;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .next-step-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
    }
    .next-step-card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .next-step-icon {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .next-step-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .next-step-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .next-step-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--border);
      color: var(--text-dim);
      padding: 2px 7px;
      border-radius: 3px;
      margin-top: 8px;
    }

    /* ── Fade in ───────────────────────────────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.12s; }
    .fade-in:nth-child(3) { animation-delay: 0.19s; }
    .fade-in:nth-child(4) { animation-delay: 0.26s; }
    .fade-in:nth-child(5) { animation-delay: 0.33s; }
  </style>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar" style="width:100%"></div></div>

<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>
  <div id="nav-timer"></div>
  <div class="nav-step" id="nav-label"></div>
  <button onclick="VectorDB.signOut().then(()=>{ localStorage.clear(); window.location.replace('/'); })"
    style="font-size:11px;opacity:0.45;background:none;border:none;cursor:pointer;color:inherit;padding:0 4px;">
    Sign out
  </button>
</nav>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div style="color:var(--text-dim);font-size:14px;letter-spacing:0.05em;">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function render(profile) {
  const name        = profile.student_name   || 'Student';
  const firstName   = name.split(' ')[0];
  const profileCode = profile.profile_code   || '—';
  const total       = profile.total_score    || 0;
  const rw          = profile.rw_score       || 0;
  const math        = profile.math_score     || 0;
  const target      = parseInt(profile.target_score) || null;
  const gap         = target ? target - total : null;
  const days        = daysUntil(profile.test_date);

  // OCEAN trait bars
  const traitMax  = { O: 11, C: 12, N: 9, E: 5, A: 3 };
  const traitNames = { O: 'O', C: 'C', N: 'N', E: 'E', A: 'A' };
  const traits = ['O','C','N','E','A'].map(t => {
    const score = profile['profile_' + t] || 0;
    const max   = traitMax[t];
    const pct   = Math.round((score / max) * 100);
    const level = pct >= 50 ? 'high' : 'low';
    const label = pct >= 50 ? 'High' : 'Low';
    return { t, pct, level, label };
  });

  const traitBarsHtml = traits.map(({ t, pct, level, label }) => `
    <div class="trait-compact-row">
      <span class="trait-compact-name">${t}</span>
      <div class="trait-compact-track">
        <div class="trait-compact-fill ${level}" style="width:0%" data-pct="${pct}"></div>
      </div>
      <span class="trait-compact-level">${label}</span>
    </div>`).join('');

  // Gap pill
  let gapHtml = '';
  if (gap !== null) {
    if (gap <= 0) {
      gapHtml = `<div class="score-gap-pill achieved">✓ Target reached</div>`;
    } else {
      gapHtml = `<div class="score-gap-pill">${gap} more points to go</div>`;
    }
  }

  // Countdown
  let countdownHtml = '';
  if (days !== null) {
    countdownHtml = days > 0
      ? `<div class="countdown-days">${days}</div>
         <div class="countdown-label">days until your test</div>
         <div class="countdown-date">${formatDate(profile.test_date)}</div>`
      : `<div class="countdown-days" style="font-size:32px;">Test date passed</div>
         <div class="countdown-date">${formatDate(profile.test_date)}</div>`;
  } else {
    countdownHtml = `<div style="font-size:14px;color:var(--text-dim);">No test date set.</div>`;
  }

  document.getElementById('app').innerHTML = `
<div class="dash-wrap">

  <div class="dash-header fade-in">
    <div>
      <div class="dash-greeting">Welcome back, ${esc(firstName)}.</div>
      <div class="dash-subgreeting">Here's where you stand.</div>
    </div>
    <div class="dash-profile-badge">${esc(profileCode)}</div>
  </div>

  <div class="dash-grid">

    <!-- Score card -->
    <div class="dash-card fade-in">
      <div class="dash-card-label">Mock SAT Score</div>
      <div class="score-total">${total || '—'}</div>
      <div class="score-outof">out of 1600</div>
      ${gapHtml}
      <div class="score-breakdown">
        <div class="score-section">
          <div class="score-section-label">Reading & Writing</div>
          <div class="score-section-val">${rw || '—'}</div>
        </div>
        <div class="score-section">
          <div class="score-section-label">Math</div>
          <div class="score-section-val">${math || '—'}</div>
        </div>
      </div>
    </div>

    <!-- Countdown card -->
    <div class="dash-card fade-in">
      <div class="dash-card-label">Test Date</div>
      ${countdownHtml}
    </div>

    <!-- OCEAN profile card -->
    <div class="dash-card fade-in">
      <div class="dash-card-label">Your Learning Profile</div>
      ${traitBarsHtml}
    </div>

    <!-- Weekly hours card -->
    <div class="dash-card fade-in">
      <div class="dash-card-label">Weekly Study Hours</div>
      <div style="font-size:36px;font-weight:900;color:var(--text);line-height:1;margin-bottom:6px;">
        ${esc(profile.weekly_hours || '—')}
      </div>
      <div style="font-size:13px;color:var(--text-dim);">hours per week</div>
    </div>

    <!-- Next steps -->
    <div class="dash-card dash-card-full fade-in">
      <div class="dash-card-label">What's Next</div>
      <div class="next-steps-grid">
        <div class="next-step-card disabled">
          <div class="next-step-icon">📝</div>
          <div class="next-step-title">Practice Session</div>
          <div class="next-step-desc">Targeted OQAAT practice matched to your profile.</div>
          <span class="next-step-badge">Coming soon</span>
        </div>
        <div class="next-step-card disabled">
          <div class="next-step-icon">📊</div>
          <div class="next-step-title">Full Report</div>
          <div class="next-step-desc">Deep dive into your score patterns and what drives them.</div>
          <span class="next-step-badge">Coming soon</span>
        </div>
        <div class="next-step-card" onclick="window.location.href='/assessment.html'">
          <div class="next-step-icon">🔁</div>
          <div class="next-step-title">Retake Assessment</div>
          <div class="next-step-desc">Take the full assessment again to track your progress.</div>
        </div>
      </div>
    </div>

  </div>
</div>`;

  // Animate trait bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.trait-compact-fill').forEach(bar => {
      const pct = bar.dataset.pct;
      setTimeout(() => { bar.style.width = pct + '%'; }, 300);
    });
  });
}

async function init() {
  const user = await VectorApp.requireAuth();
  if (!user) return;

  const { data, error } = await VectorDB.getStudentProfile(user.id);
  if (error || !data) {
    // Profile missing — send to assessment
    window.location.replace('/assessment.html');
    return;
  }
  if (!data.assessment_completed) {
    window.location.replace('/assessment.html');
    return;
  }
  render(data);
}

init();
</script>
</body>
</html>
