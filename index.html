  <script>
    window.SUPABASE_URL     = 'https://havatrfyuqqbidleplcf.supabase.co';

<body>

<!-- Progress bar -->
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<!-- Top nav -->
<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>

<!-- App root -->

<script src="js/data.js"></script>

<script>
'use strict';

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  view: 'intake',  // 'intake' | 'personality' | 'rw1' | 'rw2' | 'math' | 'done'

  // Intake
  studentName: '', currentScore: '', targetScore: '', testDate: '', weeklyStudyHours: '',

  // Personality
  personalityResponses: {},  // { pairId: 'A' | 'B' }
  personalityIndex: 0,       // current pair 0–19

  // Module state
  modulePhase: 'intro',      // 'intro' | 'active'
  qIndex: 0,                 // current question index within module

  // Responses
  rw1Responses:  {},
  rw1Score:      null,
  moduleType:    null,        // 'easy' | 'hard'
  rw2Responses:  {},
  rw2Score:      null,
  mathResponses: {},
  mathScore:     null,
  mathTimeAtEnd: null,        // timer remaining when math final Q submitted

  // Timer
  timerRemaining: 0,
  timerInterval:  null,

  // Behavioral
  behavioralData: {},   // { qId: { T0, T1, changes[], T_final } }

  // Computed
  oceanScores: null,
  profileCode:  null,
};

// ─── KATEX ────────────────────────────────────────────────────────────────────
window.katexLoaded = false;
document.addEventListener('katexReady', () => {
  window.katexLoaded = true;
  renderKatex();
});

function renderKatex() {
  if (!window.katexLoaded) return;
  const app = document.getElementById('app');
  if (!app || typeof renderMathInElement !== 'function') return;
  renderMathInElement(app, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$',  right: '$',  display: false },
    ],
    throwOnError: false,
  });
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer(seconds) {
  stopTimer();
  S.timerRemaining = seconds;
  const el = document.getElementById('nav-timer');
  if (el) el.classList.add('active');
  updateTimerDisplay();
  S.timerInterval = setInterval(() => {
    S.timerRemaining = Math.max(0, S.timerRemaining - 1);
    updateTimerDisplay();
    if (S.timerRemaining === 0) { stopTimer(); autoSubmitModule(); }
  }, 1000);
}

function stopTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  const el = document.getElementById('nav-timer');
  if (el) el.classList.remove('active', 'warn', 'critical');
}

function updateTimerDisplay() {
  const el = document.getElementById('nav-timer');
  if (!el) return;
  const m = Math.floor(S.timerRemaining / 60);
  const s = S.timerRemaining % 60;
  el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  el.classList.toggle('warn',     S.timerRemaining <= 300 && S.timerRemaining > 60);
  el.classList.toggle('critical', S.timerRemaining <= 60);
}

function autoSubmitModule() {
  // Force-save any SPR input value before auto-submitting
  const inp = document.getElementById('spr-input');
  if (inp) {
    const qs = getModuleQuestions();
    const q  = qs[S.qIndex];
    if (q) setModuleResponse(q.id, inp.value.trim());
  }
  submitModule(S.view);
}

// ─── BEHAVIORAL TRACKING ─────────────────────────────────────────────────────
function bInit(qId) {
  if (!S.behavioralData[qId]) {
    S.behavioralData[qId] = { T0: Date.now(), T1: null, changes: [], T_final: null };
  }
}

function bT1(qId) {
  const d = S.behavioralData[qId];
  if (d && d.T1 === null) d.T1 = Date.now();
}

function bChange(qId) {
  const d = S.behavioralData[qId];
  if (d) d.changes.push(Date.now());
}

function bFinal(qId) {
  const d = S.behavioralData[qId];
  if (d) d.T_final = Date.now();
}

// ─── MODULE HELPERS ───────────────────────────────────────────────────────────
function getModuleQuestions() {
  if (S.view === 'rw1')  return RW1_QUESTIONS;
  if (S.view === 'rw2')  return S.moduleType === 'hard' ? RW2_HARD_QUESTIONS : RW2_EASY_QUESTIONS;
  if (S.view === 'math') return MATH_QUESTIONS;
  return [];
}

function getModuleResponses() {
  if (S.view === 'rw1')  return S.rw1Responses;
  if (S.view === 'rw2')  return S.rw2Responses;
  if (S.view === 'math') return S.mathResponses;
  return {};
}

function setModuleResponse(qId, val) {
  if (S.view === 'rw1')  S.rw1Responses[qId]  = val;
  else if (S.view === 'rw2')  S.rw2Responses[qId]  = val;
  else if (S.view === 'math') S.mathResponses[qId] = val;
}

function allAnswered(responses, questions) {
  return questions.every(q => {
    const v = responses[q.id];
    return v !== undefined && v !== null && v !== '';
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
const VIEW_IDX   = { intake: 0, personality: 1, rw1: 2, rw2: 3, math: 4, done: 5 };
const STEP_NAMES = ['Getting Started','Learning Profile','Reading & Writing I','Reading & Writing II','Math','Complete'];

function updateProgress() {
  const idx = VIEW_IDX[S.view] ?? 0;
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = ((idx / 5) * 100) + '%';

  const lbl = document.getElementById('nav-label');
  if (!lbl) return;

  const isActive = (S.view === 'rw1' || S.view === 'rw2' || S.view === 'math') && S.modulePhase === 'active';
  if (isActive) {
    const qs = getModuleQuestions();
    lbl.innerHTML = `<strong>${STEP_NAMES[idx]}</strong> &nbsp;·&nbsp; Q ${S.qIndex + 1} / ${qs.length}`;
  } else {
    lbl.innerHTML = `Step ${idx + 1} of 6 &nbsp;·&nbsp; <strong>${STEP_NAMES[idx]}</strong>`;
  }
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  updateProgress();
  const app = document.getElementById('app');
  if (!app) return;

  const isTestView = S.view === 'rw1' || S.view === 'rw2' || S.view === 'math';

  if      (S.view === 'intake')      app.innerHTML = htmlIntake();
  else if (S.view === 'personality') app.innerHTML = htmlPersonality();
  else if (isTestView && S.modulePhase === 'intro')  app.innerHTML = htmlModuleIntro();
  else if (isTestView && S.modulePhase === 'active') app.innerHTML = htmlQuestion();
  else if (S.view === 'done')        app.innerHTML = htmlConfirmation();

  bindEvents();
  renderKatex();
  window.scrollTo(0, 0);
}

// ─── PERSONALITY ──────────────────────────────────────────────────────────────
function htmlPersonality() {
  const pair    = PERSONALITY_PAIRS[S.personalityIndex];
  const total   = PERSONALITY_PAIRS.length;
  const current = S.personalityIndex + 1;
  const chosen  = S.personalityResponses[pair.id];
  const answeredCount = Object.keys(S.personalityResponses).length;
  const allDone = answeredCount === total;
  const isLast  = S.personalityIndex === total - 1;

  const dots = PERSONALITY_PAIRS.map((p, i) => {
    let cls = '';
    if (i === S.personalityIndex)    cls = 'current';
    else if (S.personalityResponses[p.id]) cls = 'answered';
    return `<div class="q-nav-dot ${cls}" data-pi="${i}" title="Pair ${i+1}">${i+1}</div>`;
  }).join('');

  const nextBtn = isLast && allDone
    ? `<button class="btn btn-primary" id="btn-pers-submit">Continue to Assessment →</button>`
    : `<button class="btn btn-primary" id="btn-pers-next" ${!chosen ? 'disabled' : ''}>Next →</button>`;

  return `
<div class="step-container">
  <div style="max-width:680px;margin:0 auto;">
    <div class="step-title" style="margin-bottom:4px;">Learning Profile</div>
    <div class="step-subtitle" style="margin-bottom:24px;">
      There are no right answers. Choose the statement that describes how you approach studying more accurately.
    </div>

    <div class="pair-counter">Pair <span>${current}</span> of ${total}</div>

    <div class="q-nav-strip" style="margin-bottom:24px;">${dots}</div>

    <div class="card card-elevated" style="margin-bottom:24px;">
      <div class="choice-grid" id="pers-choices">
        <button class="choice-btn ${chosen === 'A' ? 'selected' : ''}" data-choice="A">
          <span class="choice-label">A</span>
          <span>${pair.textA}</span>
        </button>
        <button class="choice-btn ${chosen === 'B' ? 'selected' : ''}" data-choice="B">
          <span class="choice-label">B</span>
          <span>${pair.textB}</span>
        </button>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="btn btn-secondary" id="btn-pers-prev" ${S.personalityIndex === 0 ? 'disabled' : ''}>← Back</button>
      <div style="flex:1"></div>
      ${nextBtn}
    </div>
  </div>
</div>`;
}

// ─── QUESTION RENDERER ────────────────────────────────────────────────────────
function htmlQuestion() {
  const questions  = getModuleQuestions();
  const responses  = getModuleResponses();
  const q          = questions[S.qIndex];
  if (!q) return '';

  const currentResp = responses[q.id];
  const isLast      = S.qIndex === questions.length - 1;
  const allDone     = allAnswered(responses, questions);
  const isMath      = S.view === 'math';

  // ── Passage / context area ──
  let passageHtml = '';

  if (q.dualText) {
    passageHtml = `
    <div class="passage-box">
      <div class="dual-text-wrap">
        <div class="text-block">
          <div class="text-block-label">Text 1</div>
          ${q.dualText.text1}
        </div>
        <div class="text-block">
          <div class="text-block-label">Text 2</div>
          ${q.dualText.text2}
        </div>
      </div>
    </div>`;

  } else if (q.notes) {
    passageHtml = `
    <div class="notes-box">
      <ul>${q.notes.map(n => `<li>${n}</li>`).join('')}</ul>
      ${q.noteTask ? `<div class="notes-task">${q.noteTask}</div>` : ''}
    </div>`;

  } else if (q.passage) {
    let txt = q.passage;
    // Highlight underlined sentence
    if (q.underline) {
      txt = txt + ' <u>' + q.underline + '</u>';
}
passageHtml = `<div class="passage-box">${txt}</div>`;  
    
    if (q.table) passageHtml += q.table;

  } else if (q.table) {
    passageHtml = q.table;
  }

  // ── Question stem ──
  const qClass   = isMath ? 'math-question-text' : 'question-text';
  const qText    = q.question || q.text || '';
  const questionHtml = `<div class="${qClass}">${qText}</div>`;

  // ── Answer area ──
  let answerHtml = '';
  if (q.isSPR) {
    answerHtml = `
    <div class="spr-wrap">
      <input class="spr-input" id="spr-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="Type your answer"
        value="${currentResp !== undefined ? esc(currentResp) : ''}">
      <div class="spr-hint">Enter a number or expression (e.g. 26π or 26pi). Press Next when ready.</div>
    </div>`;
  } else if (q.choices) {
    const letters = ['A','B','C','D'].filter(l => q.choices[l]);
    answerHtml = `<div class="choices-list">
      ${letters.map(l => `
      <button class="choice-option ${currentResp === l ? 'selected' : ''}" data-letter="${l}">
        <span class="choice-letter">${l}</span>
        <span>${q.choices[l]}</span>
      </button>`).join('')}
    </div>`;
  }

  // ── Nav buttons ──
  let navBtn = '';
  if (isLast) {
    // Show Submit; disabled if not all answered
    const canSubmit = allDone || q.isSPR; // SPR: enabled/disabled by input handler
    navBtn = `
    <div>
      <button class="btn btn-primary" id="btn-q-submit" ${!allDone ? 'disabled' : ''}>
        Submit Module →
      </button>
      ${!allDone ? `<div style="font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right;">Answer all questions to submit</div>` : ''}
    </div>`;
  } else {
    const canNext = q.isSPR
      ? (currentResp !== undefined && currentResp !== null && String(currentResp).trim() !== '')
      : !!currentResp;
    navBtn = `<button class="btn btn-primary" id="btn-q-next" ${!canNext ? 'disabled' : ''}>Next →</button>`;
  }

  // ── Q nav dots ──
  const dots = questions.map((qq, i) => {
    let cls = '';
    if (i === S.qIndex)                cls = 'current';
    else if (responses[qq.id] !== undefined && responses[qq.id] !== null && responses[qq.id] !== '') cls = 'answered';
    return `<div class="q-nav-dot ${cls}" data-qi="${i}" title="Q${i+1}">${i+1}</div>`;
  }).join('');

  const domainLabel = (q.domain || '').replace('_', ' & ').toUpperCase();
  const typeLabel   = (q.type   || '').replace(/_/g, ' ');

  return `
<div class="step-container">
  <div style="max-width:820px;margin:0 auto;">

    <div class="q-nav-strip">${dots}</div>

    <div class="card">
      <div class="question-meta">
        <span class="q-num">Q${q.num}</span>
        <span class="q-type-tag">${typeLabel}</span>
        ${domainLabel ? `<span class="q-domain-tag">${domainLabel}</span>` : ''}
      </div>

      ${passageHtml}
      ${questionHtml}
      ${answerHtml}

      <div class="nav-buttons">
        <button class="btn btn-secondary" id="btn-q-prev" ${S.qIndex === 0 ? 'disabled' : ''}>← Back</button>
        <div style="flex:1"></div>
        ${navBtn}
      </div>
    </div>

  </div>
</div>`;
}

// ─── CONFIRMATION ─────────────────────────────────────────────────────────────
function htmlConfirmation() {

  <div class="confirmation-screen">
    <div class="confirmation-icon">✓</div>

    <div class="confirmation-body">
      Your results are ready. Your consultant will walk you through them at your session.
    </div>
    ${S.studentName
      ? `<div style="font-size:13px;color:var(--text-dim);margin-top:8px;">Submitted for: ${esc(S.studentName)}</div>`
      : ''}
  </div>
</div>`;
}

// ─── EVENT BINDING ────────────────────────────────────────────────────────────
function bindEvents() {
  const on    = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };
  const onAll = (sel, ev, fn) => { document.querySelectorAll(sel).forEach(el => el.addEventListener(ev, fn)); };

  // ── INTAKE ──
  if (S.view === 'intake') {
    on('btn-intake-next', 'click', handleIntakeNext);
    ['f-name','f-current','f-target','f-date','f-hours'].forEach(id => {
      on(id, 'keydown', e => { if (e.key === 'Enter') handleIntakeNext(); });
    });
  }

  // ── PERSONALITY ──
  if (S.view === 'personality') {
    onAll('.choice-btn', 'click', e => {
      const choice = e.currentTarget.dataset.choice;
      const pair   = PERSONALITY_PAIRS[S.personalityIndex];
      S.personalityResponses[pair.id] = choice;
      // Auto-advance if not on last pair
      if (S.personalityIndex < PERSONALITY_PAIRS.length - 1) {
        S.personalityIndex++;
      }
      render();
    });

    on('btn-pers-prev', 'click', () => {
      if (S.personalityIndex > 0) { S.personalityIndex--; render(); }
    });

    on('btn-pers-next', 'click', () => {
      const pair = PERSONALITY_PAIRS[S.personalityIndex];
      if (!S.personalityResponses[pair.id]) return;
      if (S.personalityIndex < PERSONALITY_PAIRS.length - 1) { S.personalityIndex++; render(); }
    });

    on('btn-pers-submit', 'click', handlePersonalitySubmit);

    onAll('.q-nav-dot[data-pi]', 'click', e => {
      S.personalityIndex = parseInt(e.currentTarget.dataset.pi, 10);
      render();
    });
  }

  // ── MODULE INTRO ──
  const isTestView = S.view === 'rw1' || S.view === 'rw2' || S.view === 'math';
  if (isTestView && S.modulePhase === 'intro') {
    on('btn-begin-module', 'click', handleBeginModule);
  }

  // ── MODULE ACTIVE ──
  if (isTestView && S.modulePhase === 'active') {
    const questions  = getModuleQuestions();
    const q          = questions[S.qIndex];
    const responses  = getModuleResponses();

    // Track T0 when question is displayed
    if (q) bInit(q.id);

    // ── SPR input ──
    if (q && q.isSPR) {
      const inp = document.getElementById('spr-input');
      if (inp) {
        inp.focus();
        const prevResp = responses[q.id];

        inp.addEventListener('input', () => {
          bT1(q.id);
          const oldVal = responses[q.id];
          const newVal = inp.value;
          if (oldVal && oldVal !== newVal) bChange(q.id);
          setModuleResponse(q.id, newVal);

          const hasVal   = newVal.trim().length > 0;
          const isLast   = S.qIndex === questions.length - 1;
          const allDone  = allAnswered(getModuleResponses(), questions);

          if (isLast) {
            const sub = document.getElementById('btn-q-submit');
            if (sub) {
              sub.disabled = !allDone;
              const note = sub.nextElementSibling;
              if (note) note.style.display = allDone ? 'none' : 'block';
            }
          } else {
            const nxt = document.getElementById('btn-q-next');
            if (nxt) nxt.disabled = !hasVal;
          }
        });
      }
    }

    // ── Multiple choice ──
    if (q && !q.isSPR) {
      onAll('.choice-option', 'click', e => {
        const letter  = e.currentTarget.dataset.letter;
        const prevVal = getModuleResponses()[q.id];
        bT1(q.id);
        if (prevVal && prevVal !== letter) bChange(q.id);
        setModuleResponse(q.id, letter);
        render();
      });
    }

    // ── Navigation ──
    on('btn-q-prev', 'click', () => {
      if (S.qIndex > 0 && q) {
        bFinal(q.id);
        S.qIndex--;
        render();
      }
    });

    on('btn-q-next', 'click', () => {
      if (!q) return;
      if (q.isSPR) {
        const inp = document.getElementById('spr-input');
        const val = inp ? inp.value.trim() : '';
        if (!val) return;
        setModuleResponse(q.id, val);
      } else {
        if (!getModuleResponses()[q.id]) return;
      }
      bFinal(q.id);
      S.qIndex++;
      render();
    });

    on('btn-q-submit', 'click', () => {
      if (!q) return;
      if (q.isSPR) {
        const inp = document.getElementById('spr-input');
        if (inp) setModuleResponse(q.id, inp.value.trim());
      }
      // Capture time remaining for math final question
      if (S.view === 'math' && S.qIndex === MATH_QUESTIONS.length - 1) {
        S.mathTimeAtEnd = S.timerRemaining;
      }
      bFinal(q.id);
      submitModule(S.view);
    });

    // ── Q dot navigation ──
    onAll('.q-nav-dot[data-qi]', 'click', e => {
      if (q) bFinal(q.id);
      S.qIndex = parseInt(e.currentTarget.dataset.qi, 10);
      render();
    });
  }
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function handleIntakeNext() {
  const name    = (document.getElementById('f-name')?.value    || '').trim();
  const current = (document.getElementById('f-current')?.value || '').trim();
  const target  = (document.getElementById('f-target')?.value  || '').trim();
  const date    = (document.getElementById('f-date')?.value    || '').trim();
  const hours   = (document.getElementById('f-hours')?.value   || '').trim();

  const errEl = document.getElementById('intake-err');
  if (!name || !current || !target || !date || !hours) {
    if (errEl) errEl.textContent = 'Please complete all fields before continuing.';
    return;
  }
  if (errEl) errEl.textContent = '';

  S.studentName      = name;
  S.currentScore     = current;
  S.targetScore      = target;
  S.testDate         = date;
  S.weeklyStudyHours = hours;

  S.view = 'personality';
  render();
}

function handlePersonalitySubmit() {
  const allDone = PERSONALITY_PAIRS.every(p => S.personalityResponses[p.id]);
  if (!allDone) return;

  S.oceanScores = computeOceanScores(S.personalityResponses);
  S.profileCode  = assignProfile(S.oceanScores);

  S.view        = 'rw1';
  S.modulePhase = 'intro';
  S.qIndex      = 0;
  render();
}

function handleBeginModule() {
  S.modulePhase = 'active';
  S.qIndex      = 0;
  const durations = { rw1: 1500, rw2: 1500, math: 1320 };
  startTimer(durations[S.view] || 1500);
  render();
}

function submitModule(module) {
  stopTimer();

  if (module === 'rw1') {
    S.rw1Score  = scoreRWModule(S.rw1Responses, RW1_QUESTIONS);
    S.moduleType = S.rw1Score >= 14 ? 'hard' : 'easy';
    S.view        = 'rw2';
    S.modulePhase = 'intro';
    S.qIndex      = 0;
    render();

  } else if (module === 'rw2') {
    const rw2Qs = S.moduleType === 'hard' ? RW2_HARD_QUESTIONS : RW2_EASY_QUESTIONS;
    S.rw2Score    = scoreRWModule(S.rw2Responses, rw2Qs);
    S.view        = 'math';
    S.modulePhase = 'intro';
    S.qIndex      = 0;
    render();

  } else if (module === 'math') {
    S.mathScore = scoreMathModule(S.mathResponses, MATH_QUESTIONS);
    finishAssessment();
  }
}

async function finishAssessment() {
  S.view = 'done';
  render();

  const sessionData = {
    studentName:          S.studentName,
    currentScore:         S.currentScore,
    targetScore:          S.targetScore,
    testDate:             S.testDate,
    weeklyStudyHours:     S.weeklyStudyHours,
    personalityResponses: S.personalityResponses,
    rw1Responses:         S.rw1Responses,
    rw1Score:             S.rw1Score,
    moduleType:           S.moduleType,
    rw2Responses:         S.rw2Responses,
    rw2Score:             S.rw2Score,
    mathResponses:        S.mathResponses,
    mathScore:            S.mathScore,
    behavioralData:       S.behavioralData,
    oceanScores:          S.oceanScores,
    profileCode:          S.profileCode,
    sessionDate:          new Date().toISOString(),
    mathTimeAtEnd:        S.mathTimeAtEnd,
  };

  try {
    await saveSession(sessionData);
  } catch (e) {
    console.error('Session save failed:', e);
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
