  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="document.dispatchEvent(new Event('katexReady'))"></script>
  <script>
    window.SUPABASE_URL      = 'https://havatrfyuqqbidleplcf.supabase.co';
    window.SUPABASE_ANON_KEY = 'sb_publishable_3v9CidUkG8p1tD_rWVcD-Q_CkZtoKAw';
  </script>
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>
  <div id="nav-timer"></div>
  <div class="nav-step" id="nav-label"></div>
</nav>

<div id="app"></div>

<script src="js/data.js"></script>
<script src="js/scoring.js"></script>
<script>
'use strict';

const S = {
  view: 'intake',
  studentName:'', currentScore:'', targetScore:'', testDate:'', weeklyStudyHours:'',
  personalityResponses:{}, personalityIndex:0,
  modulePhase:'intro', qIndex:0,
  rw1Responses:{}, rw1Score:null,
  moduleType:null,
  rw2Responses:{}, rw2Score:null,
  mathResponses:{}, mathScore:null,
  mathTimeAtEnd:null,
  timerRemaining:0, timerInterval:null,
  behavioralData:{},
  oceanScores:null, profileCode:null,
};

// KaTeX
window.katexLoaded = false;
document.addEventListener('katexReady', () => { window.katexLoaded = true; renderKatex(); });
function renderKatex() {
  if (!window.katexLoaded || typeof renderMathInElement !== 'function') return;
  renderMathInElement(document.getElementById('app'), {
    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
    throwOnError:false,
  });
}

// Timer
function startTimer(seconds) {
  stopTimer();
  S.timerRemaining = seconds;
  document.getElementById('nav-timer')?.classList.add('active');
  updateTimerDisplay();
  S.timerInterval = setInterval(() => {
    S.timerRemaining = Math.max(0, S.timerRemaining - 1);
    updateTimerDisplay();
    if (S.timerRemaining === 0) { stopTimer(); autoSubmitModule(); }
  }, 1000);
}
function stopTimer() {
  if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; }
  const el = document.getElementById('nav-timer');
  if (el) el.classList.remove('active','warn','critical');
}
function fmt(sec) {
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}
function updateTimerDisplay() {
  const t = fmt(S.timerRemaining);
  const nav = document.getElementById('nav-timer');
  if (nav) {
    nav.textContent = t;
    nav.classList.toggle('warn',     S.timerRemaining<=300 && S.timerRemaining>60);
    nav.classList.toggle('critical', S.timerRemaining<=60);
  }

}
function autoSubmitModule() {
  const inp = document.getElementById('spr-input');
  if (inp) { const qs=getModuleQuestions(); const q=qs[S.qIndex]; if(q) setR(q.id,inp.value.trim()); }
  submitModule(S.view);
}

// Behavioral
function bInit(id)   { if(!S.behavioralData[id]) S.behavioralData[id]={T0:Date.now(),T1:null,changes:[],T_final:null}; }
function bT1(id)     { const d=S.behavioralData[id]; if(d&&d.T1===null) d.T1=Date.now(); }
function bChange(id) { const d=S.behavioralData[id]; if(d) d.changes.push(Date.now()); }
function bFinal(id)  { const d=S.behavioralData[id]; if(d) d.T_final=Date.now(); }

// Helpers
function getModuleQuestions() {
  if(S.view==='rw1')  return RW1_QUESTIONS;
  if(S.view==='rw2')  return S.moduleType==='hard'?RW2_HARD_QUESTIONS:RW2_EASY_QUESTIONS;
  if(S.view==='math') return MATH_QUESTIONS;
  return [];
}
function getModuleResponses() {
  if(S.view==='rw1')  return S.rw1Responses;
  if(S.view==='rw2')  return S.rw2Responses;
  if(S.view==='math') return S.mathResponses;
  return {};
}
function setR(id,val) {
  if(S.view==='rw1')       S.rw1Responses[id]=val;
  else if(S.view==='rw2')  S.rw2Responses[id]=val;
  else if(S.view==='math') S.mathResponses[id]=val;
}
function allAnswered(res,qs) {
  return qs.every(q=>{ const v=res[q.id]; return v!==undefined&&v!==null&&v!==''; });
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Progress
const VIEW_IDX={intake:0,personality:1,rw1:2,rw2:3,math:4,done:5};
const STEP_NAMES=['Getting Started','Learning Profile','Reading & Writing I','Reading & Writing II','Math','Complete'];
const MODULE_NAMES={rw1:'Reading & Writing · Module 1',rw2:'Reading & Writing · Module 2',math:'Math · Final Module'};

function updateProgress() {
  const idx=VIEW_IDX[S.view]??0;
  const bar=document.getElementById('progress-bar');
  if(bar) bar.style.width=((idx/5)*100)+'%';
  const lbl=document.getElementById('nav-label');
  if(!lbl) return;
  const isActive=['rw1','rw2','math'].includes(S.view)&&S.modulePhase==='active';
  if(isActive) {
    const qs=getModuleQuestions();
    lbl.innerHTML=`<strong>${MODULE_NAMES[S.view]}</strong> &nbsp;·&nbsp; Q ${S.qIndex+1} / ${qs.length}`;
  } else {
    lbl.innerHTML=`Step ${idx+1} of 6 &nbsp;·&nbsp; <strong>${STEP_NAMES[idx]}</strong>`;
  }
}

// Render
function render() {
  updateProgress();
  const app=document.getElementById('app');
  if(!app) return;
  const isTest=['rw1','rw2','math'].includes(S.view);
  if     (S.view==='intake')                         app.innerHTML=htmlIntake();
  else if(S.view==='personality')                    app.innerHTML=htmlPersonality();
  else if(isTest&&S.modulePhase==='intro')           app.innerHTML=htmlModuleIntro();
  else if(isTest&&S.modulePhase==='active')          app.innerHTML=htmlQuestion();
  else if(S.view==='done')                           app.innerHTML=htmlConfirmation();
  bindEvents();
  renderKatex();
  window.scrollTo(0,0);
}

// ── Intake ──────────────────────────────────────────────────────────────────
const IS_DEV = new URLSearchParams(window.location.search).get('dev') === '1';

const DEMO_PROFILES = ['OCN','OCn','Ocn','OcN','oCn','oCN','ocn','ocN'];

function runDemo(profileCode) {
  // Fill fake intake
  S.studentName='Demo Student'; S.currentScore='1180'; S.targetScore='1450';
  S.testDate='2026-08-01'; S.weeklyStudyHours='3-5';

  // Fill personality to match profile
  const fakeOcean = {
    OCN:{ O:9, C:9, N:8, E:2, A:1 },
    OCn:{ O:9, C:9, N:2, E:2, A:1 },
    Ocn:{ O:9, C:2, N:2, E:2, A:1 },
    OcN:{ O:9, C:2, N:8, E:2, A:1 },
    oCn:{ O:2, C:9, N:2, E:2, A:1 },
    oCN:{ O:2, C:9, N:8, E:2, A:1 },
    ocn:{ O:2, C:2, N:2, E:2, A:1 },
    ocN:{ O:2, C:2, N:8, E:2, A:1 },
  };
  S.oceanScores = fakeOcean[profileCode] || fakeOcean['OCN'];
  S.profileCode  = profileCode;

  // Fake personality responses (pair 1 → O for all O profiles, etc.)
  PERSONALITY_PAIRS.forEach(p => { S.personalityResponses[p.id] = 'A'; });

  // Fake test responses — plausible scores
  S.moduleType = 'easy';
  RW1_QUESTIONS.forEach((q,i) => { S.rw1Responses[q.id]  = i < 12 ? q.answer : (q.choices ? 'A' : '5'); });
  RW2_EASY_QUESTIONS.forEach((q,i) => { S.rw2Responses[q.id] = i < 14 ? q.answer : (q.choices ? 'A' : '5'); });
  MATH_QUESTIONS.forEach((q,i) => { S.mathResponses[q.id]  = i < 8  ? q.answer : (q.isSPR ? '5' : 'A'); });

  S.rw1Score  = scoreRWModule(S.rw1Responses, RW1_QUESTIONS);
  S.rw2Score  = scoreRWModule(S.rw2Responses, RW2_EASY_QUESTIONS);
  S.mathScore = scoreMathModule(S.mathResponses, MATH_QUESTIONS);

  // Fake behavioral data
  const now = Date.now();
  [...RW1_QUESTIONS, ...RW2_EASY_QUESTIONS, ...MATH_QUESTIONS].forEach((q,i) => {
    S.behavioralData[q.id] = { T0: now + i*25000, T1: now + i*25000 + 3000, changes: [], T_final: now + i*25000 + 22000 };
  });

  S.view = 'done';
  render();
}

function htmlIntake() {
  const devPanel = IS_DEV ? `
  <div style="background:#FFF8E1;border:1.5px solid #FFD54F;border-radius:6px;padding:16px 20px;margin-bottom:28px;">
    <div style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:#F57C00;margin-bottom:10px;">⚡ DEV MODE — Generate Demo Report</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      ${DEMO_PROFILES.map(p=>`<button class="bb-btn" style="font-size:12px;padding:5px 12px;background:#fff;border:1.5px solid #FFD54F;color:#333;" onclick="runDemo('${p}')">${p}</button>`).join('')}
    </div>
  </div>` : '';

  return `
<div class="bb-screen">
  ${devPanel}
  <div class="bb-title">Welcome to VECTOR</div>
  <div class="bb-subtitle">Complete all fields below, then work through the assessment. Plan for approximately 90 minutes.</div>

  <div class="bb-form-group">
    <label class="bb-label">Full Name</label>
    <input class="bb-input" id="f-name" type="text" placeholder="Your full name"
      value="${esc(S.studentName)}" autocomplete="name">
  </div>
  <div class="bb-form-row">
    <div class="bb-form-group">
      <label class="bb-label">Current SAT Score</label>
      <input class="bb-input" id="f-current" type="text" placeholder="e.g. 1200 or N/A"
        value="${esc(S.currentScore)}">
    </div>
    <div class="bb-form-group">
      <label class="bb-label">Target SAT Score</label>
      <input class="bb-input" id="f-target" type="text" placeholder="e.g. 1450"
        value="${esc(S.targetScore)}">
    </div>
  </div>
  <div class="bb-form-group">
    <label class="bb-label">Upcoming Test Date</label>
    <input class="bb-input" id="f-date" type="date" value="${esc(S.testDate)}">
  </div>
  <div class="bb-form-group">
    <label class="bb-label">Current Weekly Study Hours</label>
    <select class="bb-select" id="f-hours">
      <option value="" ${!S.weeklyStudyHours?'selected':''}>Select...</option>
      <option value="0-2"  ${S.weeklyStudyHours==='0-2'?'selected':''}>0 – 2 hours</option>
      <option value="3-5"  ${S.weeklyStudyHours==='3-5'?'selected':''}>3 – 5 hours</option>
      <option value="6-8"  ${S.weeklyStudyHours==='6-8'?'selected':''}>6 – 8 hours</option>
      <option value="9+"   ${S.weeklyStudyHours==='9+' ?'selected':''}>9+ hours</option>
    </select>
  </div>

  <div id="intake-err" class="bb-error"></div>
  <div class="bb-nav-row" style="justify-content:flex-end;">
    <button class="bb-btn bb-btn-primary bb-btn-lg" id="btn-intake-next">Continue →</button>
  </div>
</div>`;
}

// ── Personality ─────────────────────────────────────────────────────────────
function htmlPersonality() {
  const pair   = PERSONALITY_PAIRS[S.personalityIndex];
  const total  = PERSONALITY_PAIRS.length;
  const chosen = S.personalityResponses[pair.id];
  const allDone= Object.keys(S.personalityResponses).length===total;
  const isLast = S.personalityIndex===total-1;

  const dots = PERSONALITY_PAIRS.map((p,i)=>{
    const cls=i===S.personalityIndex?'current':S.personalityResponses[p.id]?'answered':'';
    return `<div class="bb-dot ${cls}" data-pi="${i}" title="Pair ${i+1}">${i+1}</div>`;
  }).join('');

  const nextBtn=isLast&&allDone
    ?`<button class="bb-btn bb-btn-primary" id="btn-pers-submit">Continue to Assessment →</button>`
    :`<button class="bb-btn bb-btn-primary" id="btn-pers-next" ${!chosen?'disabled':''}>Next →</button>`;

  return `
<div class="bb-screen-wide">
  <div class="bb-title" style="margin-bottom:4px;">Learning Profile</div>
  <div class="bb-subtitle">There are no right answers. Choose the statement that describes how you approach studying more accurately.</div>

  <div class="bb-pair-counter">Pair <strong>${S.personalityIndex+1}</strong> of ${total}</div>
  <div class="bb-dots">${dots}</div>

  <div class="bb-choice-pair">
    <button class="bb-choice-card ${chosen==='A'?'selected':''}" data-choice="A">
      <span class="bb-choice-letter">${chosen==='A'?'✓':'A'}</span>
      <span>${pair.textA}</span>
    </button>
    <button class="bb-choice-card ${chosen==='B'?'selected':''}" data-choice="B">
      <span class="bb-choice-letter">${chosen==='B'?'✓':'B'}</span>
      <span>${pair.textB}</span>
    </button>
  </div>

  <div class="bb-nav-row">
    <button class="bb-btn bb-btn-ghost" id="btn-pers-prev" ${S.personalityIndex===0?'disabled':''}>← Back</button>
    ${nextBtn}
  </div>
</div>`;
}

// ── Module Intro ─────────────────────────────────────────────────────────────
function htmlModuleIntro() {
  const cfgs={
    rw1:{sub:'Module 1 of 2',title:'Reading & Writing',q:20,min:25,desc:'Read each passage and answer the question. Work in order — you can navigate back within the module.'},
    rw2:{sub:`Module 2 of 2 — ${S.moduleType==='hard'?'Advanced':'Standard'}`,title:'Reading & Writing',q:20,min:25,desc:'Continue with the same question format. You may not return to Module 1.'},
    math:{sub:'Final Module',title:'Math',q:18,min:22,desc:'Some questions require a typed answer. A calculator is permitted for all questions.'},
  };
  const c=cfgs[S.view];
  return `
<div class="bb-screen">
  <div class="bb-intro-card">
    <div class="bb-intro-tag">${c.sub}</div>
    <div class="bb-title" style="margin-bottom:0;">${c.title}</div>
    <div class="bb-intro-stats">
      <div>
        <div class="bb-intro-stat-val">${c.q}</div>
        <div class="bb-intro-stat-lbl">Questions</div>
      </div>
      <div class="bb-intro-divider"></div>
      <div>
        <div class="bb-intro-stat-val">${c.min}</div>
        <div class="bb-intro-stat-lbl">Minutes</div>
      </div>
    </div>
    <div class="bb-intro-desc">${c.desc}</div>
    <button class="bb-btn bb-btn-primary bb-btn-lg bb-btn-full" id="btn-begin-module">Begin Module</button>
  </div>
</div>`;
}

// ── Question ─────────────────────────────────────────────────────────────────
function htmlQuestion() {
  const questions=getModuleQuestions();
  const responses=getModuleResponses();
  const q=questions[S.qIndex];
  if(!q) return '';

  const currentResp=responses[q.id];
  const isLast=S.qIndex===questions.length-1;
  const allDone=allAnswered(responses,questions);
  const isMath=S.view==='math';
  const answeredCount=Object.values(responses).filter(v=>v!==undefined&&v!==null&&v!=='').length;

  // Passage
  let passageHtml='';
  if(q.dualText) {
    passageHtml=`
    <div class="bb-panel-tag">Texts</div>
    <div class="bb-dual-wrap">
      <div class="bb-text-block">
        <div class="bb-text-label">Text 1</div>
        <div class="bb-passage">${q.dualText.text1}</div>
      </div>
      <div class="bb-text-block">
        <div class="bb-text-label">Text 2</div>
        <div class="bb-passage">${q.dualText.text2}</div>
      </div>
    </div>`;
  } else if(q.notes) {
    passageHtml=`
    <div class="bb-panel-tag">Notes</div>
    <div class="bb-notes-box">
      <ul>${q.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
      ${q.noteTask?`<div class="bb-notes-task">${q.noteTask}</div>`:''}
    </div>`;
  } else if(q.passage) {
    let txt=q.passage;
    if(q.underline) txt=txt+' <u>'+q.underline+'</u>';
    passageHtml=`
    <div class="bb-panel-tag">Passage</div>
    <div class="bb-passage">${txt}</div>
    ${q.table?q.table.replace(/class="data-table"/g,'class="bb-data-table"'):''}`;
  } else if(q.table) {
    passageHtml=`
    <div class="bb-panel-tag">Data</div>
    ${q.table.replace(/class="data-table"/g,'class="bb-data-table"')}`;
  }

  // Answers
  let answerHtml='';
  if(q.isSPR) {
    answerHtml=`
    <div class="bb-spr-wrap">
      <input class="bb-spr-input" id="spr-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="Answer"
        value="${currentResp!==undefined?esc(currentResp):''}">
      <div class="bb-spr-hint">Enter a number or expression (e.g. 26π or 26pi)</div>
    </div>`;
  } else if(q.choices) {
    const letters=['A','B','C','D'].filter(l=>q.choices[l]);
    answerHtml=`<div class="bb-choices">
      ${letters.map(l=>`
      <button class="bb-choice ${currentResp===l?'selected':''}" data-letter="${l}">
        <span class="bb-choice-circle">${l}</span>
        <span>${q.choices[l]}</span>
      </button>`).join('')}
    </div>`;
  }

  // Dots
  const dots=questions.map((qq,i)=>{
    const ans=responses[qq.id];
    const cls=i===S.qIndex?'current':(ans!==undefined&&ans!==null&&ans!=='')?'answered':'';
    return `<div class="bb-dot ${cls}" data-qi="${i}" title="Q${i+1}">${i+1}</div>`;
  }).join('');

  const canNext=q.isSPR
    ?(currentResp!==undefined&&currentResp!==null&&String(currentResp).trim()!=='')
    :!!currentResp;

  const navHtml=`
  <div class="bb-q-nav">
    <button class="bb-btn bb-btn-ghost" id="btn-q-prev" ${S.qIndex===0?'disabled':''}>← Back</button>
    ${isLast
      ?`<div style="text-align:right;">
           <button class="bb-btn bb-btn-primary" id="btn-q-submit">Submit Module →</button>
           ${!allDone?`<div class="bb-submit-note">${answeredCount} / ${questions.length} answered</div>`:''}
         </div>`
      :`<button class="bb-btn bb-btn-primary" id="btn-q-next" ${!canNext?'disabled':''}>Next →</button>`
    }
  </div>`;

  const typeLabel=(q.type||'').replace(/_/g,' ');
  const dotsStrip=`<div class="bb-dots-strip">${dots}</div>`;
  const calcBtn = isMath ? `<button class="bb-btn bb-btn-ghost" id="btn-calc" onclick="toggleCalc()" style="font-size:12px;padding:6px 12px;">🖩 Calculator</button>` : '';

  // Math or no-passage: single column
  if(isMath || !passageHtml) {
    const stem=q.text||q.question||'';
    return `
<div class="bb-math-layout">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    ${dotsStrip.replace('margin-bottom:16px','margin-bottom:0')}
    ${calcBtn}
  </div>
  <div class="bb-math-stem">
    <div style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;">Q${q.num} · ${typeLabel}</div>
    ${passageHtml?`<div style="margin-bottom:20px;">${passageHtml}</div>`:''}
    <div class="${q.katex?'katex-content':''}" style="font-size:15px;color:var(--text);line-height:1.75;">${stem}</div>
  </div>
  <div class="${q.katex?'katex-content':''}">${answerHtml}</div>
  ${navHtml}
</div>
<div id="calc-panel" class="bb-calc-panel" style="display:none;">
  <div class="bb-calc-header">
    <span>Calculator</span>
    <button onclick="toggleCalc()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#fff;line-height:1;">×</button>
  </div>
  <iframe src="https://www.desmos.com/scientific" class="bb-calc-iframe" title="Scientific Calculator"></iframe>
</div>`;\n  }

  // Split pane
  return `
<div class="bb-question-layout">
  <div class="bb-left-panel">${passageHtml}</div>
  <div class="bb-divider-line"></div>
  <div class="bb-right-panel">
    ${dotsStrip}
    <div class="bb-q-num">
      Question ${q.num} of ${questions.length}
      <span class="bb-q-type-badge">${typeLabel}</span>
    </div>
    <div class="bb-question-stem">${q.question||q.text||''}</div>
    ${answerHtml}
    ${navHtml}
  </div>
</div>`;
}

function toggleCalc() {
  const panel = document.getElementById('calc-panel');
  if (panel) panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
}

// ── Confirmation ─────────────────────────────────────────────────────────────
function htmlConfirmation() {
  return `
<div class="bb-confirm">
  <div class="bb-confirm-icon">✓</div>
  <div class="bb-confirm-title">Assessment Complete</div>
  <div class="bb-confirm-body">Your results are ready. Your consultant will walk you through them at your session.</div>
  ${S.studentName?`<div class="bb-confirm-name">Submitted for: ${esc(S.studentName)}</div>`:''}
  <div style="margin-top:32px;">
    <button class="bb-btn bb-btn-secondary" onclick="window.location.reload()">← Return to Home</button>
  </div>
</div>`;
}

// ── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  const on   =(id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const onAll=(sel,ev,fn)=>{ document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn)); };

  if(S.view==='intake') {
    on('btn-intake-next','click',handleIntakeNext);
    ['f-name','f-current','f-target','f-date','f-hours'].forEach(id=>
      on(id,'keydown',e=>{ if(e.key==='Enter') handleIntakeNext(); }));
  }

  if(S.view==='personality') {
    onAll('.bb-choice-card','click',e=>{
      const choice=e.currentTarget.dataset.choice;
      const pair=PERSONALITY_PAIRS[S.personalityIndex];
      S.personalityResponses[pair.id]=choice;
      if(S.personalityIndex<PERSONALITY_PAIRS.length-1) S.personalityIndex++;
      render();
    });
    on('btn-pers-prev','click',()=>{ if(S.personalityIndex>0){S.personalityIndex--;render();} });
    on('btn-pers-next','click',()=>{
      const pair=PERSONALITY_PAIRS[S.personalityIndex];
      if(!S.personalityResponses[pair.id]) return;
      if(S.personalityIndex<PERSONALITY_PAIRS.length-1){S.personalityIndex++;render();}
    });
    on('btn-pers-submit','click',handlePersonalitySubmit);
    onAll('.bb-dot[data-pi]','click',e=>{S.personalityIndex=parseInt(e.currentTarget.dataset.pi,10);render();});
  }

  const isTest=['rw1','rw2','math'].includes(S.view);
  if(isTest&&S.modulePhase==='intro') on('btn-begin-module','click',handleBeginModule);

  if(isTest&&S.modulePhase==='active') {
    const questions=getModuleQuestions();
    const q=questions[S.qIndex];
    if(q) bInit(q.id);

    if(q&&q.isSPR) {
      const inp=document.getElementById('spr-input');
      if(inp) {
        inp.focus();
        inp.addEventListener('input',()=>{
          bT1(q.id);
          const old=getModuleResponses()[q.id];
          if(old&&old!==inp.value) bChange(q.id);
          setR(q.id,inp.value);
          const hasVal=inp.value.trim().length>0;
          const allDone=allAnswered(getModuleResponses(),questions);
          if(q===questions[questions.length-1]) {
            const sub=document.getElementById('btn-q-submit');
            if(sub) sub.disabled=!allDone;
          } else {
            const nxt=document.getElementById('btn-q-next');
            if(nxt) nxt.disabled=!hasVal;
          }
        });
      }
    }

    if(q&&!q.isSPR) {
      onAll('.bb-choice','click',e=>{
        const letter=e.currentTarget.dataset.letter;
        const prev=getModuleResponses()[q.id];
        bT1(q.id);
        if(prev&&prev!==letter) bChange(q.id);
        setR(q.id,letter);
        render();
      });
    }

    on('btn-q-prev','click',()=>{ if(S.qIndex>0&&q){bFinal(q.id);S.qIndex--;render();} });
    on('btn-q-next','click',()=>{
      if(!q) return;
      if(q.isSPR){
        const inp=document.getElementById('spr-input');
        const val=inp?inp.value.trim():'';
        if(!val) return;
        setR(q.id,val);
      } else {
        if(!getModuleResponses()[q.id]) return;
      }
      bFinal(q.id);
      S.qIndex++;
      render();
    });
    on('btn-q-submit','click',()=>{
      if(!q) return;
      if(q.isSPR){const inp=document.getElementById('spr-input');if(inp) setR(q.id,inp.value.trim());}
      const qs=getModuleQuestions();
      const rs=getModuleResponses();
      const unanswered=qs.filter(qq=>!rs[qq.id]).length;
      if(unanswered>0&&!confirm(`You have ${unanswered} unanswered question${unanswered>1?'s':''}. Submit anyway?`)) return;
      if(S.view==='math'&&S.qIndex===MATH_QUESTIONS.length-1) S.mathTimeAtEnd=S.timerRemaining;
      bFinal(q.id);
      submitModule(S.view);
    });
    onAll('.bb-dot[data-qi]','click',e=>{ if(q)bFinal(q.id); S.qIndex=parseInt(e.currentTarget.dataset.qi,10); render(); });
  }
}

// ── Handlers ─────────────────────────────────────────────────────────────────
function handleIntakeNext() {
  const name   =(document.getElementById('f-name')?.value    ||'').trim();
  const current=(document.getElementById('f-current')?.value ||'').trim();
  const target =(document.getElementById('f-target')?.value  ||'').trim();
  const date   =(document.getElementById('f-date')?.value    ||'').trim();
  const hours  =(document.getElementById('f-hours')?.value   ||'').trim();
  const errEl  =document.getElementById('intake-err');
  if(!name||!current||!target||!date||!hours){
    if(errEl) errEl.textContent='Please complete all fields before continuing.';
    return;
  }
  if(errEl) errEl.textContent='';
  S.studentName=name; S.currentScore=current; S.targetScore=target;
  S.testDate=date; S.weeklyStudyHours=hours;
  S.view='personality';
  render();
}

function handlePersonalitySubmit() {
  if(!PERSONALITY_PAIRS.every(p=>S.personalityResponses[p.id])) return;
  S.oceanScores=computeOceanScores(S.personalityResponses);
  S.profileCode =assignProfile(S.oceanScores);
  S.view='rw1'; S.modulePhase='intro'; S.qIndex=0;
  render();
}

function handleBeginModule() {
  S.modulePhase='active'; S.qIndex=0;
  startTimer({rw1:1500,rw2:1500,math:1320}[S.view]||1500);
  render();
}

function submitModule(module) {
  stopTimer();
  if(module==='rw1') {
    S.rw1Score  =scoreRWModule(S.rw1Responses,RW1_QUESTIONS);
    S.moduleType=S.rw1Score>=14?'hard':'easy';
    S.view='rw2'; S.modulePhase='intro'; S.qIndex=0; render();
  } else if(module==='rw2') {
    S.rw2Score=scoreRWModule(S.rw2Responses,S.moduleType==='hard'?RW2_HARD_QUESTIONS:RW2_EASY_QUESTIONS);
    S.view='math'; S.modulePhase='intro'; S.qIndex=0; render();
  } else if(module==='math') {
    S.mathScore=scoreMathModule(S.mathResponses,MATH_QUESTIONS);
    finishAssessment();
  }
}

async function finishAssessment() {
  S.view='done'; render();
  try {
    await saveSession({
      studentName:S.studentName, currentScore:S.currentScore, targetScore:S.targetScore,
      testDate:S.testDate, weeklyStudyHours:S.weeklyStudyHours,
      personalityResponses:S.personalityResponses,
      rw1Responses:S.rw1Responses, rw1Score:S.rw1Score,
      moduleType:S.moduleType,
      rw2Responses:S.rw2Responses, rw2Score:S.rw2Score,
      mathResponses:S.mathResponses, mathScore:S.mathScore,
      behavioralData:S.behavioralData,
      oceanScores:S.oceanScores, profileCode:S.profileCode,
      sessionDate:new Date().toISOString(),
      mathTimeAtEnd:S.mathTimeAtEnd,
    });
  } catch(e) { console.error('Session save failed:',e); }
}

render();
</script>
