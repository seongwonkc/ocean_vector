<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Personality-Driven SAT Prep</title>
  <link rel="stylesheet" href="css/styles-bluebook.css">
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>
  <div id="nav-timer"></div>
  <div class="nav-step" id="nav-label"></div>
  <button onclick="VectorDB.signOut().then(()=>window.location.replace('/'))" 
    style="font-size:11px;opacity:0.5;background:none;border:none;cursor:pointer;color:inherit;">
    Sign out
  </button>
</nav>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div style="color:var(--text-dim);font-size:14px;letter-spacing:0.05em;">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

function renderLogin() {
  document.getElementById('app').innerHTML = `
<div class="bb-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div class="bb-title" style="margin-bottom:8px;">VECTOR</div>
  <div class="bb-subtitle" style="max-width:400px;margin:0 auto 40px;">
    Personality-driven SAT prep.<br>Sign in to begin your assessment.
  </div>
  <button class="bb-btn bb-btn-primary bb-btn-lg" id="btn-google-login">
    Continue with Google
  </button>
</div>`;
  document.getElementById('btn-google-login')
    .addEventListener('click', () => VectorDB.signInWithGoogle());
}

// Prevents init() and onAuthStateChange from racing to route simultaneously.
let _routingStarted = false;

// Fires after the Google OAuth redirect lands back on this page.
VectorDB.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && !_routingStarted) {
    _routingStarted = true;
    VectorApp.currentUser = session.user;
    try {
      await VectorApp._routeAuthedUser(session.user.id);
    } catch(e) {
      console.error('[VECTOR] route error after sign-in:', e);
      _routingStarted = false;
      renderLogin();
    }
  }
});

async function init() {
  _routingStarted = true;
  try {
    const redirected = await VectorApp.redirectIfAuthed();
    if (!redirected) {
      _routingStarted = false;
      renderLogin();
    }
  } catch(e) {
    console.error('[VECTOR] init error:', e);
    _routingStarted = false;
    renderLogin();
  }
}

init();
</script>
</body>
</html>
