<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Personality-Driven SAT Prep</title>
  <link rel="stylesheet" href="css/styles-bluebook.css">
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>
  <div id="nav-timer"></div>
  <div class="nav-step" id="nav-label"></div>
</nav>

<div id="app">
  <!-- Replaced immediately by renderLogin() or redirected away -->
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div style="color:var(--text-dim);font-size:14px;letter-spacing:0.05em;">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
'use strict';

// ── Landing page renders login UI ─────────────────────────────────────────────
// TODO: replace htmlLogin() with the real landing page design once decided.
// Leading direction: lead with failure-mode diagnosis, not generic score promise.

function renderLogin() {
  document.getElementById('app').innerHTML = `
<div class="bb-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div class="bb-title" style="margin-bottom:8px;">VECTOR</div>
  <div class="bb-subtitle" style="max-width:400px;margin:0 auto 40px;">
    Personality-driven SAT prep.<br>Sign in to begin your assessment.
  </div>
  <button class="bb-btn bb-btn-primary bb-btn-lg" id="btn-google-login">
    Continue with Google
  </button>
</div>`;

  document.getElementById('btn-google-login')
    .addEventListener('click', () => VectorDB.signInWithGoogle());
}

// ── Auth state change — fires after the Google OAuth redirect ─────────────────
// User lands back on index.html with a fresh session.
VectorDB.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    VectorApp.currentUser = session.user;
    await VectorApp._routeAuthedUser(session.user.id);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const redirected = await VectorApp.redirectIfAuthed();
  if (!redirected) renderLogin();
}

init();
</script>
</body>
</html>
