<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Assessment</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .placeholder-wrap {
      max-width: 520px;
      margin: 80px auto 0;
      padding: 0 24px;
      text-align: center;
    }
    .placeholder-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent, #0077c8);
      margin-bottom: 16px;
    }
    .placeholder-title {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      color: var(--text, #1a1a1a);
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .placeholder-sub {
      font-size: 15px;
      color: var(--text-dim, #666);
      line-height: 1.7;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">VECTOR</div>
  <button
    onclick="VectorDB.signOut().then(()=>window.location.replace(\'\'))"
    class="nav-link"
    style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-dim,#666);">
    Sign out
  </button>
</nav>

<!-- Seneca link banner (shown when VECTOR_USE_SDK=true and bridge missing) -->
<div id="seneca-link-banner" style="display:none;align-items:center;justify-content:space-between;
  gap:12px;padding:10px 20px;background:#fff7e6;border-bottom:1px solid #f5d08a;font-size:13px;">
  <span>Connect your Seneca account to unlock personalised study guidance.</span>
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <a href="/seneca-callback.html" style="font-weight:600;color:#b87000;">Connect</a>
    <button onclick="sessionStorage.setItem(\'vector_link_banner_dismissed\',\'1\');
      document.getElementById(\'seneca-link-banner\').style.display=\'none\';"
      style="background:none;border:none;cursor:pointer;color:#999;font-size:18px;line-height:1;">×</button>
  </div>
</div>

<main id="app">
  <div class="placeholder-wrap">
    <div class="placeholder-eyebrow">Diagnostic</div>
    <div class="placeholder-title">Your session is being prepared.</div>
    <p class="placeholder-sub">
      The diagnostic flow is loading. If this message persists,
      try refreshing the page.
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/linkFlow.js"></script>
<script>
async function init() {
  const user = await VectorApp.requireAuth();
  if (!user) return;
  await VectorApp.checkBridgeOnProtectedPage();
}
init();
</script>

</body>
</html>
