<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Consultant Dashboard</title>
  <link rel="stylesheet" href="css/styles-consultant.css">
  <link rel="stylesheet" href="css/styles-report.css">

<script src="config.js"></script></head>
<body>

<!-- Progress bar (static at 100% for consultant view) -->
<div id="progress-bar-wrap"><div id="progress-bar" style="width:100%;"></div></div>

<!-- Top nav -->
<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Consultant Dashboard</span></div>
  <div class="nav-step" id="nav-label"></div>
  <div id="nav-timer"></div>
</nav>

<!-- App root -->
<div id="app"></div>

<script src="js/data.js"></script>
<script src="js/scoring.js"></script>
<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONSULTANT_PASSWORD = '1234';  // ← Kevin: change this before sharing

// ─── STATE ───────────────────────────────────────────────────────────────────
const CS = {
  authenticated: false,
  sessions: [],
  loading: false,
  loadError: null,
  selectedId: null,   // session student_id (or index) of currently open report
  selectedSession: null,
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  if (isNaN(d)) return isoStr;
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  if (!CS.authenticated) {
    app.innerHTML = htmlPasswordGate();
    bindPasswordEvents();
    return;
  }

  app.innerHTML = htmlDashboard();
  bindDashboardEvents();
}

// ─── PASSWORD GATE ────────────────────────────────────────────────────────────
function htmlPasswordGate() {
  return `
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 72px);">
  <div class="pw-gate">
    <h1>Consultant Access</h1>
    <p>Enter your access password to view student reports.</p>
    <input class="form-input" id="pw-input" type="password" placeholder="Password"
      autocomplete="current-password" style="text-align:center;letter-spacing:0.12em;font-size:16px;margin-bottom:12px;">
    <div id="pw-error" class="pw-error" style="min-height:18px;"></div>
    <button class="btn btn-primary w-full" id="btn-pw-submit" style="margin-top:16px;">
      Enter Dashboard →
    </button>
  </div>
</div>`;
}

function bindPasswordEvents() {
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('btn-pw-submit');
  const err = document.getElementById('pw-error');

  function attempt() {
    const val = (inp?.value || '').trim();
    if (val === CONSULTANT_PASSWORD) {
      CS.authenticated = true;
      loadSessions();
    } else {
      if (err) err.textContent = 'Incorrect password.';
      if (inp) { inp.value = ''; inp.focus(); }
    }
  }

  if (btn) btn.addEventListener('click', attempt);
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });

  // Auto-focus password field
  setTimeout(() => { if (inp) inp.focus(); }, 50);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function htmlDashboard() {
  const sidebarContent = CS.loading
    ? `<div class="loading-dots" style="padding:32px;text-align:center;">
         <span></span><span></span><span></span>
       </div>`
    : CS.loadError
    ? `<div style="padding:20px;font-size:13px;color:var(--danger-light);">
         Failed to load sessions.<br><br>
         <button class="btn btn-secondary" id="btn-retry" style="font-size:12px;padding:6px 12px;">Retry</button>
       </div>`
    : CS.sessions.length === 0
    ? `<div class="empty-state" style="padding:32px;">
         <h3>No sessions yet</h3>
         <p>Sessions will appear here once students complete the assessment.</p>
       </div>`
    : `<ul class="student-list">${CS.sessions.map((s, i) => htmlStudentItem(s, i)).join('')}</ul>`;

  const reportContent = CS.selectedSession
    ? htmlReport(CS.selectedSession)
    : `<div class="empty-state">
         <h3>Select a student</h3>
         <p>Click a name from the list to view their full report.</p>
       </div>`;

  return `
<div class="consultant-layout">
  <div class="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3>Sessions <span style="font-size:12px;color:var(--text-dim);font-weight:400;">(${CS.sessions.length})</span></h3>
      <button class="btn btn-ghost" id="btn-refresh" style="font-size:12px;padding:4px 10px;" title="Refresh">↻ Refresh</button>
    </div>
    ${sidebarContent}
  </div>
  <div class="report-panel" id="report-panel">
    ${reportContent}
  </div>
</div>`;
}

function htmlStudentItem(session, idx) {
  const isActive = CS.selectedSession?.student_id === session.student_id &&
                   CS.selectedSession?.session_date === session.session_date;
  const profileCode = session.profile_code || '—';
  const profileLabel = session.profile_label || '';
  const scoreTotal = (session.rw_module1_score || 0) + (session.rw_module2_score || 0) + (session.math_score || 0);

  return `
<li class="student-item ${isActive ? 'active' : ''}" data-idx="${idx}">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div class="student-name">${esc(session.student_id || 'Unnamed')}</div>
    <span class="student-profile-badge">${esc(profileCode)}</span>
  </div>
  <div class="student-meta">${fmtDate(session.session_date)}</div>
  ${profileLabel ? `<div class="student-meta" style="color:var(--text-muted);font-style:italic;">${esc(profileLabel)}</div>` : ''}
  ${session.rw_module1_score !== null
    ? `<div class="student-meta">Score: ${scoreTotal} / 58</div>` : ''}
</li>`;
}

// ─── REPORT WRAPPER ───────────────────────────────────────────────────────────
function htmlReport(dbSession) {
  // Re-hydrate sessionData from the DB row format that generateReport() expects
  const sessionData = {
    studentName:          dbSession.student_id,
    currentScore:         dbSession.current_score,
    targetScore:          dbSession.target_score,
    testDate:             dbSession.test_date,
    weeklyStudyHours:     dbSession.weekly_study_hours,
    personalityResponses: dbSession.personality_responses || {},
    rw1Responses:         dbSession.rw_module1_responses  || {},
    rw1Score:             dbSession.rw_module1_score       || 0,
    moduleType:           dbSession.module2_type           || 'easy',
    rw2Responses:         dbSession.rw_module2_responses  || {},
    rw2Score:             dbSession.rw_module2_score       || 0,
    mathResponses:        dbSession.math_responses         || {},
    mathScore:            dbSession.math_score             || 0,
    behavioralData:       dbSession.behavioral_data        || {},
    oceanScores:          dbSession.ocean_scores           || { O:0, C:0, N:0, E:0, A:0 },
    profileCode:          dbSession.profile_code           || 'ocn',
    sessionDate:          dbSession.session_date,
  };

  let reportHtml = '';
  try {
    reportHtml = generateReport(sessionData);
  } catch (e) {
    reportHtml = `<div style="color:var(--danger-light);padding:20px;">Error generating report: ${esc(e.message)}</div>`;
  }

  return `
<div style="padding:32px 32px 48px;background:#F7F8FA;min-height:100%">
  <div class="report-container">
    <div class="report-header">
      <div>
        <div class="report-logo">VECTOR <span>Powered by OCEAN</span></div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:0.04em;">CONFIDENTIAL — Consultant Use Only</div>
      </div>
      <div class="report-meta">
        <strong>${esc(dbSession.student_id || 'Student')}</strong>
        ${fmtDate(dbSession.session_date)}
        ${dbSession.module2_type
          ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">Module 2: ${dbSession.module2_type === 'hard' ? 'Advanced' : 'Standard'}</div>` : ''}
      </div>
    </div>
    ${reportHtml}
  </div>
</div>`;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindDashboardEvents() {
  const on    = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };
  const onAll = (sel, ev, fn) => { document.querySelectorAll(sel).forEach(el => el.addEventListener(ev, fn)); };

  on('btn-refresh', 'click', loadSessions);
  on('btn-retry',   'click', loadSessions);

  onAll('.student-item', 'click', e => {
    const idx = parseInt(e.currentTarget.dataset.idx, 10);
    const session = CS.sessions[idx];
    if (!session) return;
    CS.selectedSession = session;

    // Re-render only the report panel (avoid full re-render which loses sidebar scroll)
    const panel = document.getElementById('report-panel');
    if (panel) panel.innerHTML = htmlReport(session);

    // Update active state in sidebar
    document.querySelectorAll('.student-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });

    // Scroll report panel to top
    if (panel) panel.scrollTop = 0;
  });
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadSessions() {
  CS.loading   = true;
  CS.loadError = null;
  render();

  const result = await fetchAllSessions();

  CS.loading = false;

  if (result.error && result.error !== 'not_configured') {
    CS.loadError = result.error;
    CS.sessions  = [];
  } else if (result.error === 'not_configured') {
    // Supabase not yet configured — show placeholder data for UI testing
    CS.sessions  = [];
    CS.loadError = 'Supabase is not configured. Replace YOUR_SUPABASE_URL and YOUR_ANON_KEY in both HTML files, then reload.';
  } else {
    CS.sessions = result.data || [];
    // Re-select if the previously selected session still exists
    if (CS.selectedSession) {
      const refreshed = CS.sessions.find(
        s => s.student_id === CS.selectedSession.student_id &&
             s.session_date === CS.selectedSession.session_date
      );
      CS.selectedSession = refreshed || null;
    }
  }

  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
