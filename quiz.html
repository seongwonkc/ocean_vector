<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR | Learning Profile Quiz</title>
  <link rel="stylesheet" href="css/styles-bluebook.css">
</head>
<body>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<nav id="top-nav">
  <div class="nav-logo">VECTOR <span>Powered by OCEAN</span></div>
  <div id="nav-timer"></div>
  <div class="nav-step" id="nav-label"></div>
</nav>

<div id="app"></div>

<script src="js/data.js"></script>
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
const Q = {
  index: 0,
  responses: {}, // { q1: 'A', q2: 'B', ... }
};

// ── Scoring ───────────────────────────────────────────────────────────────────
function computeQuizScores(responses) {
  const scores = { O: 0, C: 0, N: 0, E: 0, A: 0 };
  for (const pair of QUIZ_PAIRS) {
    const r = responses[pair.id];
    if (r === 'A' && pair.traitA) scores[pair.traitA] = (scores[pair.traitA] || 0) + 1;
    if (r === 'B' && pair.traitB) scores[pair.traitB] = (scores[pair.traitB] || 0) + 1;
  }
  return scores;
}

function assignQuizProfile(scores) {
  const O = scores.O / QUIZ_TRAIT_MAX.O >= 0.5 ? 'O' : 'o';
  const C = scores.C / QUIZ_TRAIT_MAX.C >= 0.5 ? 'C' : 'c';
  const N = scores.N / QUIZ_TRAIT_MAX.N >= 0.5 ? 'N' : 'n';
  return O + C + N;
}

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = (Q.index / QUIZ_PAIRS.length) * 100;
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = pct + '%';

  const lbl = document.getElementById('nav-label');
  if (lbl) lbl.innerHTML =
    `Question <strong>${Q.index + 1}</strong> of ${QUIZ_PAIRS.length}`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  updateProgress();
  document.getElementById('app').innerHTML = htmlPair();
  bindEvents();
  window.scrollTo(0, 0);
}

function htmlPair() {
  const pair   = QUIZ_PAIRS[Q.index];
  const chosen = Q.responses[pair.id];
  const isLast = Q.index === QUIZ_PAIRS.length - 1;
  const allDone = Object.keys(Q.responses).length === QUIZ_PAIRS.length;

  // Dot strip
  const dots = QUIZ_PAIRS.map((p, i) => {
    const cls = i === Q.index ? 'current' : Q.responses[p.id] ? 'answered' : '';
    return `<div class="bb-dot ${cls}" data-qi="${i}" title="${i + 1}">${i + 1}</div>`;
  }).join('');

  const submitBtn = isLast && allDone
    ? `<button class="bb-btn bb-btn-primary" id="btn-quiz-submit">See Your Results →</button>`
    : `<button class="bb-btn bb-btn-primary" id="btn-quiz-next"
        ${!chosen ? 'disabled' : ''}>Next →</button>`;

  return `
<div class="bb-screen-wide">
  <div class="bb-title" style="margin-bottom:4px;">What kind of learner are you?</div>
  <div class="bb-subtitle">No right answers. Pick the statement that sounds more like you.</div>

  <div class="bb-pair-counter">
    Question <strong>${Q.index + 1}</strong> of ${QUIZ_PAIRS.length}
  </div>
  <div class="bb-dots">${dots}</div>

  <div class="bb-choice-pair">
    <button class="bb-choice-card ${chosen === 'A' ? 'selected' : ''}" data-choice="A">
      <span class="bb-choice-letter">${chosen === 'A' ? '✓' : 'A'}</span>
      <span>${pair.textA}</span>
    </button>
    <button class="bb-choice-card ${chosen === 'B' ? 'selected' : ''}" data-choice="B">
      <span class="bb-choice-letter">${chosen === 'B' ? '✓' : 'B'}</span>
      <span>${pair.textB}</span>
    </button>
  </div>

  <div class="bb-nav-row">
    <button class="bb-btn bb-btn-ghost" id="btn-quiz-prev"
      ${Q.index === 0 ? 'disabled' : ''}>← Back</button>
    ${submitBtn}
  </div>
</div>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function bindEvents() {
  const on    = (id, ev, fn) => { const el = document.getElementById(id); if (el) el.addEventListener(ev, fn); };
  const onAll = (sel, ev, fn) => document.querySelectorAll(sel).forEach(el => el.addEventListener(ev, fn));

  onAll('.bb-choice-card', 'click', e => {
    const choice = e.currentTarget.dataset.choice;
    const pair   = QUIZ_PAIRS[Q.index];
    Q.responses[pair.id] = choice;
    // Auto-advance unless last question
    if (Q.index < QUIZ_PAIRS.length - 1) {
      Q.index++;
    }
    render();
  });

  on('btn-quiz-prev', 'click', () => {
    if (Q.index > 0) { Q.index--; render(); }
  });

  on('btn-quiz-next', 'click', () => {
    const pair = QUIZ_PAIRS[Q.index];
    if (!Q.responses[pair.id]) return;
    if (Q.index < QUIZ_PAIRS.length - 1) { Q.index++; render(); }
  });

  on('btn-quiz-submit', 'click', () => {
    if (Object.keys(Q.responses).length < QUIZ_PAIRS.length) return;
    finishQuiz();
  });

  onAll('.bb-dot[data-qi]', 'click', e => {
    Q.index = parseInt(e.currentTarget.dataset.qi, 10);
    render();
  });
}

// ── Finish ────────────────────────────────────────────────────────────────────
function finishQuiz() {
  const scores      = computeQuizScores(Q.responses);
  const profileCode = assignQuizProfile(scores);

  localStorage.setItem('vector_quiz', JSON.stringify({
    responses:   Q.responses,
    scores,
    profileCode,
    completed:   true,
    timestamp:   new Date().toISOString(),
  }));

  window.location.href = '/results.html';
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Resume if partially completed in this session
const saved = localStorage.getItem('vector_quiz');
if (saved) {
  try {
    const parsed = JSON.parse(saved);
    // If already fully completed, go straight to results
    if (parsed.completed && parsed.profileCode) {
      window.location.replace('/results.html');
    } else if (parsed.responses) {
      Q.responses = parsed.responses;
      // Advance to first unanswered question
      for (let i = 0; i < QUIZ_PAIRS.length; i++) {
        if (!Q.responses[QUIZ_PAIRS[i].id]) { Q.index = i; break; }
        if (i === QUIZ_PAIRS.length - 1) Q.index = i;
      }
    }
  } catch(e) { /* corrupt storage — start fresh */ }
}

render();
</script>
</body>
</html>
